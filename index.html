    <style>
    /* Ilay token no nahatonga nanisy anio body io */

    /* POPUP */
    .modal-overlay{
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.4);
    display:flex;align-items:center;justify-content:center;

    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* LOCK SCREEN rehefa mandefa */

    position:fixed;
    top:0;

    .contactContainer .phone-group{

    }

    .contactContainer input{

    }

    /* MOBILE */
    @media (max-width:768px){

    .contactContainer .phone-group{
    flex-direction:row;
    }

    .contactContainer .phone-prefix{
    padding:8px 10px;

    .contactContainer input{

    .contactContainer .phone-group{

    }

    .contactContainer input{

    /* bouton ajouter */

    /* CONTACT CLIENT PRO DESIGN */

    .contactContainer{
    display:flex;
    flex-direction:column;
    gap:6px;

    }

    .client-contact-line{

    }

    .client-contact-line .delete{

    flex-shrink:0;
    }

    .add-client-contact{

    }

    .client-contact-line{
    display:flex;

    .add-icon{
    width:30px;
    height:30px;
    display:flex;

    /* COMPACT DESIGN HO AN'NY SMARTPHONE KELY */
    @media (max-width:480px){

    body{
    padding:10px;

    <body>

    <div id="loader" style="text-align:center;margin-top:80px;font-size:18px;">
        ⏳ Chargement...
    </div>

    <div id="app" style="display:none;">

    <div class="logo-container">
    <img src="logo.jpg" class="logo">
    </div>

    <div class="main-title">LIVRAISON DIA MAIKA</div>

    <div class="card">
        <h3>Pour la récupération</h3>

        <div class="field">
            <label>Nom du responsable</label>
            <input type="text" id="nomResp">
        </div>

        <div class="field">
            <label>Contact du responsable *</label>
            <div id="contactContainer">

            <div class="phone-group contact-item">

                <div class="phone-prefix">🇲🇬 +261</div>

                <input type="tel" inputmode="numeric"
                class="contactResp"
                placeholder="032 12 345 67">

                <button type="button" class="add-icon"
                onclick="addContact()">➕</button>

                <button type="button" class="delete"
                onclick="removeContact(this)">🗑</button>

            </div>

        </div>
    <div class="error-message" id="errContactResp"></div>
    </div>

    <div class="field">
    <label>Lieu de récupération *</label>
    <input type="text" id="lieuRecup">
    <div class="error-message" id="errLieuRecup"></div>
    </div>

    <div class="field">
    <label>Page Facebook (optionnel)</label>
    <input type="text" id="pageFacebook" placeholder=" ">
    </div>

    </div>

    <h3 id="tableTitle"></h3>
    <div id="livraisonCount" style="font-weight:600;margin-bottom:10px;">
        Nombre de livraisons : 0
    </div>
    <div class="required-note">* : Champs obligatoires</div>

    <div class="table-container">
    <table id="livraisonTable">
    <thead>
    <tr>
    <th>N° Suivi</th>
    <th>Date</th>
    <th>Nom du client</th>
    <th>Contact du client *</th>
    <th>Lieu de livraison (Précis) *</th>
    <th>Article</th>
    <th>Prix du colis + livraison (Ar) *</th>
    <th>Remarque</th>
    <th>Supprimer la livraison</th>
    </tr>
    </thead>
    <tbody></tbody>
    </table>
    </div>

    <button class="btn add" onclick="addRow();updateNumbers();updateLivraisonCount();">
        ➕ Ajouter une livraison
    </button>
    <button class="btn send" onclick="submitForm()">Envoyer</button>

    <script>

    function startApp(){

        document.getElementById("loader").style.display = "none";
        document.getElementById("app").style.display = "block";

        // =========================
        // 🔥 NOM AUTO FROM URL
        // =========================

        if(secure && secure.nom){
        const nomResp = document.getElementById("nomResp");

        nomResp.value = secure.nom;

        nomResp.setAttribute("readonly", true);
        nomResp.style.background = "#e9ecef";
        nomResp.style.cursor = "not-allowed";
        }

        // =========================
        // 🔥 ADD FIRST ROW
        // =========================
        addRow();
        updateNumbers();
        updateLivraisonCount();
        loadFormData();

        // =========================
        // 🔁 UPDATE rehefa miova (juste sécurité)
        // =========================
        document.getElementById("nomResp")
            .addEventListener("input", updateNumbers);

    }

// GLOBAL TOKEN
let isTokenValid = false;
function getSecureParams(){

  const params = new URLSearchParams(window.location.search);
  const data = params.get("data");

  if(!data) return null;

  try{
    const decoded = atob(data);
    return JSON.parse(decoded);
  }catch(e){
    return null;
  }
}

const secure = getSecureParams();

if(!secure || !secure.token || !secure.nom){
  document.getElementById("loader").innerHTML = "Lien invalide ❌";
  throw new Error("Invalid link");
}

const token = secure.token;
const nom = secure.nom;

// GESTION TOKEN
(async function(){

  if(!token){
    document.getElementById("loader").innerHTML = "Lien invalide ❌";
return;
  }

  try{

    const API_URL = "https://script.google.com/macros/s/AKfycbws46prbkUdKw8OSrzX3PwICO93NzViSaii9oHU-YcquZ6vANDzxojFh1BPpwvNirK5/exec";
    const res = await fetch(
        API_URL + "?token=" + token + "&nom=" + encodeURIComponent(nom)
    );

    const data = await res.json();
    console.log("STATUS BACKEND:", data);

    if(data.status === "expired"){
        showSuccessPage();
        return;
    }

    if(data.status === "invalid"){
     document.getElementById("loader").innerHTML = "Lien invalide ❌";
      return;
    }

    if(data.status === "nom_mismatch"){
        showSuccessPage();
        return;
    }

    if(data.status === "used"){
        showSuccessPage();
        return;
    }

    // ✅ TOKEN OK → aseho ny page
    isTokenValid = true;

    // 👉 ATOMBOKA APP REHETRA
    startApp();

  }catch(e){
   document.getElementById("loader").innerHTML = "Lien invalide ❌";
  }

})();

    // Code normal
    const today=new Date();
    today.setDate(today.getDate()+1);

    const formattedDate = today.getDate().toString().padStart(2,'0') + '/' +
    (today.getMonth()+1).toString().padStart(2,'0') + '/' +
    today.getFullYear();

    document.getElementById("tableTitle").textContent="Livraison du "+formattedDate;

    function formatPhone(value){value=value.replace(/\D/g,'');if(value.length>10)value=value.slice(0,10);return value.replace(/(\d{3})(\d{2})(\d{3})(\d{2})/,'$1 $2 $3 $4');}
    function validateSingleContact(v){return /^(032|033|034|037|038)\d{7}$/.test(v.replace(/\s/g,''));}
    function attachPhoneFormatting(input){input.addEventListener("input",function(){this.value=formatPhone(this.value);});input.addEventListener("blur",validateTopFields);}
    document.querySelectorAll(".contactResp").forEach(input => {

    attachPhoneFormatting(input);

    /* vérification duplication récupération */
    input.addEventListener("input", function(){

    checkDuplicateInContainer(
    document.getElementById("contactContainer")
    );

    });

    });

    function addContact(){

    const container = document.getElementById("contactContainer");

    const div = document.createElement("div");
    div.className = "phone-group contact-item";
    div.style.marginTop = "8px";

    div.innerHTML = `
    <div class="phone-prefix">🇲🇬 +261</div>

    <input type="tel" inputmode="numeric"
    class="contactResp"
    placeholder="032 12 345 67">

    <button type="button" class="add-icon"
    onclick="addContact()">➕</button>

    <button type="button" class="delete"
    onclick="removeContact(this)">🗑</button>
    `;

    container.appendChild(div);

    const input = div.querySelector("input");

    /* format automatique téléphone */
    attachPhoneFormatting(input);

    /* verifie duplication contact récupération */
    input.addEventListener("blur", function(){
    checkDuplicateInContainer(
    document.getElementById("contactContainer")
    );
    });

    /* focus automatique */
    input.focus();

    }

    function removeContact(btn){
    const container=document.getElementById("contactContainer");
    if(container.children.length===1){showAlert("Au moins un numéro est obligatoire.");return;}
    btn.parentElement.remove();validateTopFields();
    }

    document.getElementById("lieuRecup").addEventListener("blur",validateTopFields);

    function validateTopFields(){

    let valid = true;
    let contacts = document.querySelectorAll(".contactResp");
    let atLeastOne = false;
    let numbers = [];

    contacts.forEach(input => {

        let value = input.value.trim();
        let num = value.replace(/\D/g,'');

        // ❌ format invalide
        if(!validateSingleContact(value)){
            input.classList.add("error-border");
            valid = false;
            return;
        }

        // ❌ duplication
        if(numbers.includes(num)){
            input.classList.add("error-border");
            valid = false;
        }else{
            numbers.push(num);
            input.classList.remove("error-border");
            atLeastOne = true;
        }

    });

    // ❌ raha tsy misy numero valide
    if(!atLeastOne){
        document.getElementById("errContactResp").textContent =
            "Au moins un numéro valide est requis";
        valid = false;
    }else{
        document.getElementById("errContactResp").textContent = "";
    }

    // LIEU
    let lieu = document.getElementById("lieuRecup");

    if(lieu.value.trim()===""){
        lieu.classList.add("error-border");
        document.getElementById("errLieuRecup").textContent="Champ obligatoire";
        valid=false;
    }else{
        lieu.classList.remove("error-border");
        document.getElementById("errLieuRecup").textContent="";
    }

    return valid;
}

    function addRow(){

    const tbody=document.querySelector("#livraisonTable tbody");
    const row=tbody.insertRow();

    let numberCell = row.insertCell(0);
    numberCell.className="number-cell";
    row.insertCell(1).textContent=formattedDate;

    for(let i=2;i<=7;i++){

    let cell=row.insertCell(i);

    /* CONTACT CLIENT */
    if(i===3){

    cell.innerHTML=`
    <div class="contactContainer">

    <div class="client-contact-line">

    <span class="phone-icon">📞</span>

    <input type="tel" inputmode="numeric"
    class="contactClient"
    placeholder="032 12 345 67">

    <button type="button" class="add-icon"
    onclick="addClientContact(this)">➕</button>

    <button type="button" class="delete"
    onclick="removeClientContact(this)">🗑</button>

    </div>

    <div class="error-message"></div>

    </div>
    `;

    const input=cell.querySelector(".contactClient");
    attachPhoneFormatting(input);
    handleTabNavigation(input);

    /* vérification duplication contact livraison */
    input.addEventListener("blur", function(){
    checkDuplicateInContainer(
    input.closest(".contactContainer")
    );
    });

    }

    /* PRIX */
    else if(i===6){

    cell.innerHTML='<input type="tel" inputmode="numeric" class="prixInput" style="width:100%;border:none;outline:none;font-size:16px">';

    }

    /* AUTRES COLONNES */
    else{

    cell.contentEditable=true;

    cell.addEventListener("keydown",function(e){

    if(e.key==="Tab"){

    e.preventDefault();

    validateCell(this,this.cellIndex);

    let cellIndex=this.cellIndex;
    let row=this.parentElement;

    let next=row.cells[cellIndex+1];

    if(next){

    let input=next.querySelector("input");

    if(input){
    input.focus();
    }else{
    placeCaretAtEnd(next);
    }

    }else{

    let nextRow=row.nextElementSibling;

    if(nextRow){
    placeCaretAtEnd(nextRow.cells[2]);
    }else{

    addRow();

    setTimeout(()=>{

    let rows=document.querySelectorAll("#livraisonTable tbody tr");
    let lastRow=rows[rows.length-1];

    placeCaretAtEnd(lastRow.cells[2]);

    },50);

    }

    }

    }

    });

    cell.addEventListener("blur",()=>validateCell(cell,i));

    }

    }

    /* PRIX FORMAT */
    const prixInput=row.querySelector(".prixInput");
    handleTabNavigation(prixInput);

    if(prixInput){

    prixInput.addEventListener("input",function(){

    let raw=this.value.replace(/\D/g,'');

    if(raw===""){
    this.value="";
    return;
    }

    let value=parseInt(raw);

    if(value<0)value=0;
    if(value>1010000)value=1010000;

    this.value=value.toLocaleString('fr-FR');

    });

    }

    /* FOCUS PRIX */
    const prixCell=row.cells[6];

    prixCell.addEventListener("click",()=>{
    if(prixInput){
    prixInput.focus();
    }
    });

    /* BOUTON SUPPRIMER LIGNE */
    const action=row.insertCell(8);

    const btn=document.createElement("button");
    btn.innerHTML="🗑 Supprimer la Livraison";
    btn.className="delete";

    btn.onclick=()=>{

    if(tbody.rows.length===1){
    showAlert("Impossible de supprimer la dernière ligne.");
    return;
    }

    tbody.removeChild(row);
    updateNumbers();
    updateLivraisonCount();
    };

    action.appendChild(btn);

    updateNumbers();
    updateLivraisonCount();

    /* focus automatique makany @ Nom du client rehefa manindry ajout ligne */
    setTimeout(()=>{

    /* focus raha tsy mobile */
    if(window.innerWidth > 768){
    placeCaretAtEnd(row.cells[2]);
    }

    },50);

    }

    function placeCaretAtEnd(el){el.focus();const range=document.createRange();range.selectNodeContents(el);range.collapse(false);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);}

    function validateCell(cell,index){

    cell.classList.remove("error-border");

    let value = index===6
    ? (cell.querySelector("input")?.value || "")
    : cell.textContent.trim();

    /* CONTACT CLIENT */
    if(index===3){

    let inputs = Array.from(cell.querySelectorAll(".contactClient"));
    let errorMsg = cell.querySelector(".error-message");

    let validCount = 0;
    let hasError = false;

    inputs.forEach(input=>{

    let v = input.value.trim();

    /* vide */
    if(v===""){
    input.classList.add("error-border");
    hasError = true;
    return;
    }

    /* numero diso */
    if(!validateSingleContact(v)){
    input.classList.add("error-border");
    hasError = true;
    }else{
    input.classList.remove("error-border");
    validCount++;
    }

    });

    /* au moins un numero valide */
    if(validCount===0 || hasError){

    cell.classList.add("error-border");

    if(errorMsg){
    errorMsg.textContent="Au moins un numéro valide est requis";
    }

    }else{

    cell.classList.remove("error-border");

    if(errorMsg){
    errorMsg.textContent="";
    }

    }

    }

    /* LIEU LIVRAISON */
    if(index===4){

    if(value===""){
    cell.classList.add("error-border");
    }

    }

    /* PRIX */
    if(index===6){

    let raw=value.replace(/\D/g,'');

    if(raw===""){
    cell.classList.add("error-border");
    return;
    }

    let num=parseInt(raw);

    if(isNaN(num) || num<0 || num>1010000){
    cell.classList.add("error-border");
    return;
    }

    /* format automatique */
    let input=cell.querySelector("input");

    if(input){
    input.value=num.toLocaleString('fr-FR');
    }

    }

    }

    function updateNumbers(){

        const nomResp = document.getElementById("nomResp").value.trim();

        let initiales = "DM";

        if(nomResp !== ""){

        initiales = nomResp
        .split(/\s+/)                 // manasaraka ny mots
        .filter(n => n.length > 0)    // manala espace vide
        .map(n => n[0].toUpperCase()) // maka lettre voalohany
        .join("");

        }

        const jour = formattedDate.split("/")[0].padStart(2,'0');

        document.querySelectorAll("#livraisonTable tbody tr").forEach((row,i)=>{

        row.cells[0].textContent = initiales + "/" + jour + "/" + (i+1);

        });

    }

    function validateTable(){

    let valid=true;

    document.querySelectorAll("#livraisonTable tbody tr").forEach(row=>{

    [3,4,6].forEach(i=>{

    validateCell(row.cells[i],i);

    if(i===6){

    let input=row.cells[6].querySelector("input");

    if(!input || input.value.trim()===""){
    row.cells[6].classList.add("error-border");
    valid=false;
    }

    }else{

    if(row.cells[i].classList.contains("error-border")){
    valid=false;
    }

    }

    });

    });

    return valid;

    }


    // Makany @ erreur de saisie automatique ilay curseur
    function focusFirstError(){

    /* top fields */
    const topErrors = document.querySelector(".contactResp.error-border, #lieuRecup.error-border");

    if(topErrors){

    topErrors.scrollIntoView({behavior:"smooth", block:"center"});

    setTimeout(()=>{
    topErrors.focus();
    },300);

    return;

    }

    /* CONTACT CLIENT INPUT ERROR PRIORITAIRE */
    const clientInputError = document.querySelector(".contactClient.error-border");

    if(clientInputError){

    clientInputError.scrollIntoView({behavior:"smooth", block:"center"});

    setTimeout(()=>{
    clientInputError.focus();
    clientInputError.click();
    },300);

    return;

    }

    /* autres erreurs tableau */
    const cellError = document.querySelector("#livraisonTable td.error-border");

    if(cellError){

    let input = cellError.querySelector("input");

    cellError.scrollIntoView({behavior:"smooth", block:"center"});

    setTimeout(()=>{

    if(input){
    input.focus();
    }else{
    placeCaretAtEnd(cellError);
    }

    },300);

    }

    }

    function buildPayload(){

    const contacts=Array.from(document.querySelectorAll(".contactResp"))
    .map(i=>i.value.trim())
    .filter(v=>validateSingleContact(v));

    const rows=document.querySelectorAll("#livraisonTable tbody tr");

    let livraisons=[];

    rows.forEach(row=>{

    let numeroSuivi=row.cells[0].textContent.trim();
    let nomClient=row.cells[2].textContent.trim();

    let contacts = Array.from(row.cells[3].querySelectorAll(".contactClient"))
    .map(i=>i.value.trim())
    .filter(v=>validateSingleContact(v));

    let contactClient = contacts.join(" / ");
    let lieuLivraison=row.cells[4].textContent.trim();
    let article=row.cells[5].textContent.trim();
    let prix=(row.cells[6].querySelector("input")?.value || "").replace(/\s/g,'');
    let remarque=row.cells[7].textContent.trim();

    /* Obligatoire */
    if(contactClient==="" || lieuLivraison==="" || prix===""){
    return;
    }

    livraisons.push({
    numeroSuivi:numeroSuivi,
    nomClient:nomClient,
    contactClient:contactClient,
    lieuLivraison:lieuLivraison,
    article:article,
    prix:prix,
    remarque:remarque
    });

    });

    return {
        token: token, // ity ilay token
        dateLivraison:formattedDate,
        nomResponsable:document.getElementById("nomResp").value.trim(),
        contactResponsable:contacts.join(" / "),
        lieuRecuperation:document.getElementById("lieuRecup").value.trim(),
        pageFacebook:document.getElementById("pageFacebook").value.trim(),
        livraisons:livraisons
    };

    }

    function showAlert(message){
    return new Promise(resolve=>{
    const overlay=document.createElement("div");
    overlay.className="modal-overlay";
    overlay.innerHTML=`<div class="modal">
    <h4>Information</h4>
    <p>${message}</p>
    <button class="ok">OK</button>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector(".ok").onclick=()=>{overlay.remove();resolve();};
    });
    }

    function showConfirm(message){
    return new Promise(resolve=>{
    const overlay=document.createElement("div");
    overlay.className="modal-overlay";
    overlay.innerHTML=`<div class="modal">
    <h4>Confirmation</h4>
    <p>${message}</p>
    <button class="confirm">Oui</button>
    <button class="cancel">Annuler</button>
    </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector(".confirm").onclick=()=>{overlay.remove();resolve(true);};
    overlay.querySelector(".cancel").onclick=()=>{overlay.remove();resolve(false);};
    });
    }

    let isSubmitting=false;
    const sendBtn=document.querySelector(".btn.send");

    function buildSummary(payload){

    let html = `<div style="text-align:left;font-size:13px;max-height:300px;overflow:auto">`;

    html += `<b>Date livraison :</b> ${payload.dateLivraison}<br>`;
    html += `<b>Nombre de livraisons :</b> ${payload.livraisons.length}<br><br>`;

    html += `<b>Responsable :</b> ${payload.nomResponsable || "-"}<br>`;
    html += `<b>Contact :</b> ${payload.contactResponsable}<br>`;
    html += `<b>Lieu récupération :</b> ${payload.lieuRecuperation}<br>`;
    html += `<b>Page Facebook :</b> ${payload.pageFacebook || "-"}<br><br>`;

    html += `<b>Liste des livraisons :</b><br><br>`;

    payload.livraisons.forEach((l,i)=>{
    html += `
    <div style="margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee">
    <b>N° Suivi : ${l.numeroSuivi} </b></br>
    Client : ${l.nomClient || "-"}<br>
    Contact : ${l.contactClient}<br>
    Lieu : ${l.lieuLivraison}<br>
    Article : ${l.article || "-"}<br>
    Prix : ${Number(l.prix).toLocaleString('fr-FR')} Ar <br>
    Remarque : ${l.remarque || "-"}
    </div>
    `;
    });

    html += `</div>`;

    return html;
    }

    function showSummary(payload){
    return new Promise(resolve=>{

    const overlay=document.createElement("div");
    overlay.className="modal-overlay";

    overlay.innerHTML=`
    <div class="modal" style="max-width:400px">
    <h4>Résumé avant envoi</h4>
    ${buildSummary(payload)}

    <button class="confirm">Confirmer</button>
    <button class="cancel">Modifier</button>
    </div>
    `;

    document.body.appendChild(overlay);

    overlay.querySelector(".confirm").onclick=()=>{
    overlay.remove();
    resolve(true);
    };

    overlay.querySelector(".cancel").onclick=()=>{
    overlay.remove();
    resolve(false);
    };

    });
    }

    async function submitForm(){
    if(isSubmitting) return;

    /* vérification duplication récupération */
    if(checkDuplicateInContainer(document.getElementById("contactContainer"))){
    await showAlert("Corrigez les numéros du responsable en double ❌");
    return;
    }

    /* vérification duplication livraison */
    let dupLivraison = false;

    document.querySelectorAll(".contactContainer").forEach(c=>{
    if(checkDuplicateInContainer(c)){
    dupLivraison = true;
    }
    });

    if(dupLivraison){
    await showAlert("Corrigez les numéros clients en double ❌");
    return;
    }

    let validTop=validateTopFields();
    let validTable=validateTable();

    if(!validTop||!validTable){
    await showAlert("Veuillez corriger les erreurs ❌");

    setTimeout(()=>{
    focusFirstError();
    },200);

    return;
    }

    const payload=buildPayload();

    const confirmation=await showSummary(payload);

    if(!confirmation) return;

    isSubmitting=true;
    sendBtn.disabled=true;
    sendBtn.textContent="Envoi en cours…";
    lockScreen();

    try{

    const res=await fetch("https://script.google.com/macros/s/AKfycbws46prbkUdKw8OSrzX3PwICO93NzViSaii9oHU-YcquZ6vANDzxojFh1BPpwvNirK5/exec",
    {method:"POST",body:JSON.stringify(payload)});

    const response=await res.json();

    // gestion token
    if(response.result==="used"){
    unlockScreen();
    await showAlert("Ce lien a déjà été utilisé ❌");
     showSuccessPage();
    return;
    }

    if(response.result==="expired"){
        unlockScreen();
    await showAlert("Lien expiré ⏳");
     showSuccessPage();
    return;
    }

    if(response.result==="invalid"){
        unlockScreen();
    await showAlert("Lien invalide ❌");
     showSuccessPage();
    return;
    }

    if(response.result==="nom_mismatch"){
        unlockScreen();
    await showAlert("Lien non autorisé ❌");
     showSuccessPage();
    return;
    }

    // code normal
    if(response.result==="success"){

    // ⚡ sauvegarde local
    localStorage.setItem("token_"+token, "used");

    await showAlert("Données envoyées ✅<br><br>Vos livraisons sont bien enregistrées,<br> Une liste récapitulative vous sera envoyée par message pour confirmer vos commandes.<br><br>Merci de votre confiance 🙂");
    
    localStorage.removeItem("formData_"+token);
    
    // 👉 PAGE VIDE
    showSuccessPage();
    return;

    }else{
    await showAlert("Erreur lors de l'envoi ❌");
    }

    }catch(e){
    await showAlert("Erreur connexion ❌");
    }

    isSubmitting=false;
    sendBtn.disabled=false;
    sendBtn.textContent="Envoyer";
    unlockScreen();
    }

    function resetForm(){
    document.getElementById("nomResp").value="";
    document.getElementById("lieuRecup").value="";
    document.getElementById("pageFacebook").value="";
    window.scrollTo({top:0,behavior:"smooth"});
    location.reload();
    }

    function resetLivraisons(){

    const tbody = document.querySelector("#livraisonTable tbody");

    /* fafana daholo ny lignes */
    tbody.innerHTML = "";

    /* mamorona ligne vaovao */
    addRow();
    updateNumbers();
    updateLivraisonCount();

    /* scroll hiverina any ambony */
    window.scrollTo({
    top:0,
    behavior:"smooth"
    });

    }

    // Ity ilay lien (Mameno formulaire direct)
    function getParam(param){
    const params = new URLSearchParams(window.location.search);
    return params.get(param);
    }

    /* Lock écran rehefa mandefa */
    function lockScreen(){
    if(document.querySelector(".screen-lock")) return;

    const div=document.createElement("div");
    div.className="screen-lock";
    div.innerHTML="⏳ Envoi en cours...";
    document.body.appendChild(div);
    }

    /* Unlock écran rehefa vita */  
    function unlockScreen(){
    const lock=document.querySelector(".screen-lock");
    if(lock) lock.remove();
    }

    // Ajout contact client
    function addClientContact(btn){

    const container = btn.closest(".contactContainer");

    const div = document.createElement("div");
    div.className="client-contact-line";

    div.innerHTML=`
    <span class="phone-icon">📞</span>

    <input type="tel" inputmode="numeric"
    class="contactClient"
    placeholder="032 12 345 67">

    <button type="button" class="add-icon"
    onclick="addClientContact(this)">➕</button>

    <button type="button" class="delete"
    onclick="removeClientContact(this)">🗑</button>
    `;

    container.insertBefore(div, container.querySelector(".error-message"));

    const input = div.querySelector("input");
    attachPhoneFormatting(input);
    handleTabNavigation(input);

    /* vérification duplication contact livraison */
    input.addEventListener("blur", function(){
    checkDuplicateInContainer(
    input.closest(".contactContainer")
    );
    });

    input.focus();

    }

    function removeClientContact(btn){

    const container = btn.closest(".contactContainer");

    if(container.querySelectorAll(".contactClient").length===1){
    showAlert("Au moins un numéro est obligatoire.");
    return;
    }

    btn.parentElement.remove();

    }

    function handleTabNavigation(element){

    element.addEventListener("keydown",function(e){

    if(e.key==="Tab"){

    e.preventDefault();

    let cell = element.closest("td");
    let row = cell.parentElement;
    let index = cell.cellIndex;

    validateCell(cell,index);

    let next = row.cells[index+1];

    if(next){

    let input = next.querySelector("input");

    if(input){
    input.focus();
    }else{
    placeCaretAtEnd(next);
    }

    }else{

    let nextRow=row.nextElementSibling;

    if(nextRow){
    placeCaretAtEnd(nextRow.cells[2]);
    }

    }

    }

    });

    }

    function updateLivraisonCount(){

        const rows = document.querySelectorAll("#livraisonTable tbody tr").length;

        document.getElementById("livraisonCount").textContent =
        "Nombre de livraisons : " + rows;

    }

    function checkDuplicateInContainer(container){

        const inputs = Array.from(container.querySelectorAll("input[type='tel']"));

        let numbers = [];
        let duplicate = false;

        /* reset border */
        inputs.forEach(input=>{
        input.classList.remove("error-border");
        });

        inputs.forEach(input=>{

        let num = input.value.replace(/\D/g,'');

        if(num === "") return;

        if(numbers.includes(num)){
        duplicate = true;
        input.classList.add("error-border");
        }else{
        numbers.push(num);
        }

        });

        /* message */
        let errorMsg = container.querySelector(".error-message");

        if(!errorMsg){
        errorMsg = document.getElementById("errContactResp");
        }

        if(errorMsg){
        errorMsg.textContent = duplicate ? "⚠ Numéro déjà saisi" : "";
        }

        return duplicate;

    }

    function lockForm(){

        // désactiver tous les inputs
        document.querySelectorAll("input, td[contenteditable]").forEach(el=>{
            el.setAttribute("disabled", true);
            el.setAttribute("contenteditable", false);
            el.style.background = "#e9ecef";
            el.style.cursor = "not-allowed";
        });

        // désactiver boutons
        document.querySelectorAll("button").forEach(btn=>{
            btn.disabled = true;
            btn.style.opacity = "0.6";
            btn.style.cursor = "not-allowed";
        });

        // message
        const msg = document.createElement("div");
        msg.style.textAlign = "center";
        msg.style.fontWeight = "bold";
        msg.style.marginTop = "20px";
        msg.style.color = "#198754";
        msg.innerHTML = "✅ Formulaire déjà envoyé";

        document.getElementById("app").appendChild(msg);

    }

    function showSuccessPage(){

        // fafana daholo contenu
        document.body.innerHTML = `
            <div style="
                display:flex;
                align-items:center;
                justify-content:center;
                height:100vh;
                text-align:center;
                font-family:'Segoe UI',sans-serif;
            ">
                <div>
                    <h2 style="color:#fa0202;">DIA MAIKA SERVICES</h2>
                    <p style="font-size:15px;">
                        Merci de demander un nouveau lien <br>
                        pour insérer vos prochaines livraisons. <br><br>
                        Merci de votre confiance 🙂
                    </p>
                </div>
            </div>
        `;
    }

    document.addEventListener("input", function(){
        saveFormData();
    });

    function saveFormData(){

        const data = {
            nomResp: document.getElementById("nomResp").value,
            lieuRecup: document.getElementById("lieuRecup").value,
            pageFacebook: document.getElementById("pageFacebook").value,
            contactsResp: Array.from(document.querySelectorAll(".contactResp")).map(i=>i.value),

            livraisons: Array.from(document.querySelectorAll("#livraisonTable tbody tr")).map(row=>{
                return {
                    nomClient: row.cells[2].textContent,
                    contactsClient: Array.from(row.cells[3].querySelectorAll(".contactClient")).map(i=>i.value),
                    lieu: row.cells[4].textContent,
                    article: row.cells[5].textContent,
                    prix: row.cells[6].querySelector("input")?.value || "",
                    remarque: row.cells[7].textContent
                };
            })
        };

        localStorage.setItem("formData_"+token, JSON.stringify(data));
    }

    function loadFormData(){

        const saved = localStorage.getItem("formData_"+token);

        if(!saved) return;

        const data = JSON.parse(saved);

        document.getElementById("nomResp").value = data.nomResp || "";
        document.getElementById("lieuRecup").value = data.lieuRecup || "";
        document.getElementById("pageFacebook").value = data.pageFacebook || "";

        // CONTACT RESPONSABLE
        const container = document.getElementById("contactContainer");
      
        const inputsResp = document.querySelectorAll(".contactResp");

        /* premier input */
        inputsResp[0].value = data.contactsResp[0] || "";

        /* manampy hafa */
        for(let i = 1; i < data.contactsResp.length; i++){
            addContact();
            const allInputs = document.querySelectorAll(".contactResp");
            allInputs[i].value = data.contactsResp[i];
        }

        // TABLE
        const tbody = document.querySelector("#livraisonTable tbody");
        tbody.innerHTML = "";

        data.livraisons.forEach(l=>{
            addRow();

            const row = tbody.lastElementChild;

            row.cells[2].textContent = l.nomClient || "";

            const contacts = row.cells[3].querySelector(".contactContainer");
            
           const container = row.cells[3].querySelector(".contactContainer");

            /* premier input */
            let firstInput = container.querySelector(".contactClient");
            firstInput.value = l.contactsClient[0] || "";

            /* manampy hafa */
            for(let i = 1; i < l.contactsClient.length; i++){
                const btn = container.querySelector(".add-icon");
                addClientContact(btn);

                const inputs = container.querySelectorAll(".contactClient");
                inputs[i].value = l.contactsClient[i];
            }

            row.cells[4].textContent = l.lieu || "";
            row.cells[5].textContent = l.article || "";
            row.cells[6].querySelector("input").value = l.prix || "";
            row.cells[7].textContent = l.remarque || "";
        });

        setTimeout(()=>{

            // 🔥 VALIDATION GLOBAL
            validateTopFields();

            // 🔥 FORCE EVENT "input" (important)
            document.querySelectorAll(".contactResp").forEach(input=>{
                input.dispatchEvent(new Event("input"));
                input.dispatchEvent(new Event("blur"));
            });

            // 🔥 CLIENT CONTACTS
            document.querySelectorAll(".contactClient").forEach(input=>{
                input.dispatchEvent(new Event("input"));
                input.dispatchEvent(new Event("blur"));
            });

        }, 100);

        updateNumbers();
        updateLivraisonCount();
    }

    </script>
